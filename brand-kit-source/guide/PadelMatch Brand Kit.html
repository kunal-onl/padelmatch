<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=5">
<title>PadelMatch · Brand Kit v1.0</title>

<!-- Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;700;900&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">

<style>
  *, *::before, *::after { box-sizing: border-box; }
  body { margin: 0; background: #F5F2E8; font-family: 'DM Sans', sans-serif; -webkit-font-smoothing: antialiased; }
  button { font-family: inherit; }
  pre { font-family: 'DM Mono', monospace; }
  code { font-family: 'DM Mono', monospace; }
  ::selection { background: #C9E52F; color: #111118; }
</style>

<!-- Brand geometry engine — provides window.PM.* for Section 09 -->
<script src="brand-engine-v2.js"></script>
<script src="brand-wordmark-v2.js"></script>

<!-- JSZip for client-side code-package download -->
<script src="https://unpkg.com/jszip@3.10.1/dist/jszip.min.js"></script>

<!-- Inlined brand kit package files (auto-generated from padelmatch-brand-kit/) -->
<script src="bk/package-files.js"></script>

<!-- React + Babel -->
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<!-- Calibrate font metrics for lockup renderer before mounting -->
<script>
  window.__bk_ready = (async () => {
    if (window.PM && PM.calibrate) { try { await PM.calibrate(); } catch(_) {} }
  })();
</script>

<!-- Tokens (plain JS, no Babel) -->
<script src="bk/tokens.js"></script>

<!-- Components & sections (JSX, via Babel) -->
<script type="text/babel" src="bk/containers.jsx"></script>
<script type="text/babel" src="bk/textures.jsx"></script>
<script type="text/babel" src="bk/section-helpers.jsx"></script>
<script type="text/babel" src="bk/sections-01-04.jsx"></script>
<script type="text/babel" src="bk/sections-05-07.jsx"></script>
<script type="text/babel" src="bk/section-08.jsx"></script>
<script type="text/babel" src="bk/section-09-logo.jsx"></script>
<script type="text/babel" src="bk/app.jsx"></script>
</head>
<body>
  <div id="app"></div>
</body>
</html>
